name: brooski_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  intl: ^0.19.0

  # 🔥 Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.15.0
  cloud_firestore: ^4.13.0
  firebase_storage: ^11.5.0
  firebase_messaging: ^14.7.6

  # 👇 Keep 6.x to satisfy AGP 8 namespace rules in the plugin
  flutter_keyboard_visibility: ^6.0.0

  # 🗺️ Google Maps & Location
  google_maps_flutter: ^2.6.1
  flutter_polyline_points: ^2.0.0
  location: ^5.0.3
  url_launcher: ^6.2.6
  http: ^1.2.1
  google_sign_in: ^6.2.1
  geolocator: ^10.1.0

  # 📸 Image Picker for KYC
  image_picker: ^1.0.5

  # 📱 Google Fonts for UI
  google_fonts: ^6.2.1

  # 🔍 Typeahead for Autocomplete — upgraded to work with keyboard_visibility ^6.x
  flutter_typeahead: ^5.2.0

  # ⚙️ State Management
  flutter_riverpod: ^2.5.0

  # 💬 Toasts
  fluttertoast: ^8.2.2

  # 🧠 Basic form validation
  form_field_validator: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
